# Fly.io deployment. After `fly launch --no-deploy`, set secrets:
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-... APP_PASSWORD=your-shared-password
# Then `fly deploy`.

app = "mp4-to-webgl"
primary_region = "sjc"

[build]

[env]
  NODE_ENV = "production"
  # Cheaper defaults for the per-token SDK path — override per-call by setting
  # CLAUDE_ANALYSIS_MODEL/CLAUDE_GENERATION_MODEL secrets to opus if needed.
  CLAUDE_ANALYSIS_MODEL = "claude-sonnet-4-6"
  CLAUDE_GENERATION_MODEL = "claude-sonnet-4-6"
  CLAUDE_DIAGNOSIS_MODEL = "claude-haiku-4-5-20251001"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "performance-2x"
  memory = "4gb"
